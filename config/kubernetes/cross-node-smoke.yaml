apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailnet-smoke
  namespace: default
spec:
  replicas: 6
  selector:
    matchLabels:
      app: tailnet-smoke
  template:
    metadata:
      labels:
        app: tailnet-smoke
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: tailnet-smoke
      containers:
        - name: nginx
          image: registry.k8s.io/e2e-test-images/agnhost:2.53
          args:
            - netexec
            - --http-port=8080
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: tailnet-smoke
  namespace: default
spec:
  selector:
    app: tailnet-smoke
  ports:
    - name: http
      port: 80
      targetPort: 8080
