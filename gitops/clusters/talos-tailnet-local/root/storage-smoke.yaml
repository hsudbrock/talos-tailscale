apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: longhorn-demo
  namespace: storage-smoke
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: Service
metadata:
  name: longhorn-demo
  namespace: storage-smoke
spec:
  selector:
    app: longhorn-demo
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: longhorn-demo
  namespace: storage-smoke
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: longhorn-demo
  template:
    metadata:
      labels:
        app: longhorn-demo
    spec:
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f /data/index.html ]; then
                echo 'longhorn persistent storage ok' > /data/index.html
              fi
              exec httpd -f -p 8080 -h /data
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
          volumeMounts:
            - mountPath: /data
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: longhorn-demo
